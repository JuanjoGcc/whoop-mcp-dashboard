runtime: "container"

startCommand:
  type: "http"
  configSchema:
    type: "object"
    properties:
      whoopRefreshToken:
        type: "string"
        title: "Whoop Refresh Token"
        description: "Refresh token obtained by running `bun run login` locally (recommended — required if your account uses email OTP)"
        format: "password"
      whoopEmail:
        type: "string"
        title: "Whoop Email"
        description: "Your Whoop account email address (only works for accounts without email OTP)"
      whoopPassword:
        type: "string"
        title: "Whoop Password"
        description: "Your Whoop account password"
        format: "password"
      mcpAuthToken:
        type: "string"
        title: "MCP Auth Token"
        description: "Optional authentication token for securing MCP endpoint access"
        format: "password"
  exampleConfig:
    whoopEmail: "user@example.com"
    whoopPassword: "your-password"
    mcpAuthToken: "optional-secret-token"

build:
  dockerfile: "Dockerfile"
  dockerBuildPath: "."

env:
  NODE_ENV: "production"
